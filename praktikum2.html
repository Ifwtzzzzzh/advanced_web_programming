<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Praktikum 2</title>
    <script src="main.js"></script>
  </head>
  <body>
    <h1>Latihan JS External</h1>
    <input type="text" id="nama" placeholder="Masukkan nama" />
    <button onclick="tampilPesan()">Tampilkan Data</button>
    <button onclick="prosesData()">Proses Data</button>
    <button onclick="tampilData()">Tampil Data</button>
    <button onclick="cekTipe()">Cek Tipe</button>
    <p id="hasil"></p>

    <h1>Operator Aritmatika</h1>
    <button onclick="hitung()">Hitung</button>
    <h1>Operator Perbandingan</h1>
    <button onclick="banding()">Bandingkan</button>
    <h1>Cek Logika</h1>
    <button onclick="cekLogika()">Cek Logika</button>
    <h1>Latihan Function</h1>
    <button onclick="sapa()">Sapa</button>
    <h1>Function dengan Parameter</h1>
    <button onclick="sapaNama('Nosa')">Sapa Gw Brother</button>
    <button onclick="hitungParam(5, 3)">Hitung ini Brother</button>
  </body>
</html>
